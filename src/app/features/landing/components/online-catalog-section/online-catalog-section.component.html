<section id="catalogo" class="py-16 bg-background">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
      <div class="order-2 lg:order-1">
        <ui-card class="overflow-hidden">
          <div class="relative">
            <img src="ancient-digital-catalog-interface.jpg"
                 [alt]="t()('catalog.imageAlt')"
                 class="w-full h-96 object-cover"/>
            <div class="absolute inset-0 bg-linear-to-t from-black/40 to-transparent"></div>
          </div>
        </ui-card>
        <div class="mt-6 text-center">
          <app-button ui-button size="lg" class="bg-primary hover:bg-primary/90">
            {{ t()('catalog.accessButton') }}
          </app-button>
        </div>
      </div>
      <div class="order-1 lg:order-2">
        <h2 class="text-3xl font-bold text-foreground mb-6">
          {{ t()('catalog.title') }}
        </h2>
        <div class="space-y-4">
          @for (key of paragraphKeys; track key) {
            <p class="text-base lg:text-lg text-muted-foreground text-pretty">
              {{ t()(key) }}
            </p>
          }
        </div>
      </div>
    </div>
  </div>
</section>
